<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- fragmento 1 para Agregar producto en ventana modal -->
<section th:fragment="tabs" class="py-3 mb-4">
    <div class="d-flex justify-content-center px-5"> 
        <ul class="nav nav-underline">
            <li class="nav-item">
                <a th:href="@{/}" 
                   th:classappend="${idCategoriaActual == null} ? 'active'"
                   class="nav-link" 
                   aria-current="page">
                    [[#{pruebas.todas}]]
                </a>
            </li>
            <li th:each="c : ${categorias}" class="nav-item">
                <a th:href="@{/consultas/{id}(id=${c.idCategoria})}"
                   th:classappend="${idCategoriaActual != null and idCategoriaActual.equals(c.idCategoria)} ? 'active'"
                   class="nav-link">
                    [[${c.descripcion}]]
                </a>
            </li>
        </ul>
    </div>
</section>



<!-- fragmento 2 para el listado de tarjetas de productos -->
<section th:fragment="tarjetas" class="container py-4">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p : ${productos}" class="col">
            <div class="card h-100 shadow-sm">

                <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                    <img th:src="${p.rutaImagen}" class="img-fluid" 
                         th:alt="${p.descripcion}" 
                         style="max-height: 100%; object-fit: contain;"/>
                </div>

                <div class="card-header bg-white">
                    <h5 class="card-title text-center text-truncate mb-0" th:text="${p.descripcion}">Título</h5>
                </div>

                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted mb-auto text-truncate" th:text="${p.detalle}">Detalle</p>
                </div>

                <div class="card-footer bg-white d-flex justify-content-between align-items-center">

                    <div class="fw-bold">
                        <span class="text-success h5" th:text="${#numbers.formatCurrency(p.precio)}">$99.99</span>

                        <span th:if="${p.existencias > 0}" 
                              class="badge text-bg-success ms-2"
                              th:text="${p.existencias} + ' unidades'"></span>

                        <span th:unless="${p.existencias > 0}" 
                              class="badge text-bg-danger ms-2">
                            Agotado
                        </span>
                    </div>

                    <form th:action="@{/carrito/agregar}" th:method="POST" class="d-inline">
                        <input type="hidden" th:value="${p.idProducto}" name="idProducto"/>

                        <button type="submit" 
                                class="btn btn-sm btn-primary" 
                                th:disabled="${p.existencias == 0}"
                                onclick="addCart(this.form)">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>



<!-- fragmento 3 para mostrar los 3 formularios de las consultas -->
<section th:fragment='consultas' class='row row-cols-4 p-2'>

    <!-- Consultas -->
    <div th:replace="~{consultas/fragmentos :: formConsulta('primary',#{consultas.derivadas},'/consultas/consultaDerivada')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsulta('warning',#{consultas.jpql},'/consultas/consultaJPQL')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsulta('success',#{consultas.sql},'/consultas/consultaSQL')}"/>


    <!-- Consulta avanzada de producto -->
    <div class='card p-2'>

        <form method="post" th:action="@{/consultas/productoDerivada}" class="was-validated">

            <div class="card-header text-center text-white bg-dark">
                <h5>Consulta Avanzada Producto</h5>
            </div>

            <div class="card-body">

                <div class='mb-3'>
                    <label>Precio mínimo</label>
                    <input type="number" name="precioMin" class="form-control" required/>
                </div>

                <div class='mb-3'>
                    <label>Precio máximo</label>
                    <input type="number" name="precioMax" class="form-control" required/>
                </div>

                <div class='mb-3'>
                    <label>Existencias mínimas</label>
                    <input type="number" name="existenciasMin" class="form-control" required/>
                </div>

                <div class='mb-3'>
                    <label>Texto categoría</label>
                    <input type="text" name="descripcionCategoria" class="form-control" required/>
                </div>

            </div>

            <div class="card-footer text-center">

                <button type="submit" class="btn btn-dark">
                    Derivada
                </button>

                <button type="submit"
                        formaction="/consultas/productoJPQL"
                        class="btn btn-warning">
                    JPQL
                </button>

                <button type="submit"
                        formaction="/consultas/productoSQL"
                        class="btn btn-success">
                    SQL
                </button>

            </div>

        </form>

    </div>


    <!-- CONSULTA AVANZADA CATEGORIA -->

    <div class='card p-2'>

        <form method="post" th:action="@{/consultas/categoriaDerivada}" class="was-validated">

            <div class="card-header text-center text-white bg-info">
                <h5>Consulta Avanzada Categoría</h5>
            </div>

            <div class="card-body">

                <div class='mb-3'>
                    <label>Cantidad mínima de productos</label>
                    <input type="number" name="cantidadMinProductos"
                           class="form-control" required/>
                </div>

                <div class='mb-3'>
                    <label>Texto descripción</label>
                    <input type="text" name="textoDescripcion"
                           class="form-control" required/>
                </div>

            </div>

            <div class="card-footer text-center">

                <button type="submit" class="btn btn-info">
                    Derivada
                </button>

                <button type="submit"
                        formaction="/consultas/categoriaJPQL"
                        class="btn btn-warning">
                    JPQL
                </button>

                <button type="submit"
                        formaction="/consultas/categoriaSQL"
                        class="btn btn-success">
                    SQL
                </button>

            </div>

        </form>

    </div>

</section>



<!-- fragmento 4 para mostrar el formulario factorizado -->
<div th:fragment='formConsulta(colorForm, textoForm, urlForm)'>

    <form method="post" th:action='@{${urlForm}}' class='was-validated'>

        <div class='card p-2'>

            <div class="card-header text-center text-white"
                 th:classappend="${'bg-'+colorForm}">
                <h5>[[${textoForm}]]</h5>
            </div>

            <div class="card-body">

                <div class='mb-3'>
                    <label>[[#{consultas.precio.inferior}]]</label>
                    <input type="number"
                           name='precioInf'
                           th:value='${precioInf}'
                           class='form-control'
                           min="0"
                           required/>
                </div>

                <div class='mb-3'>
                    <label>[[#{consultas.precio.superior}]]</label>
                    <input type="number"
                           name='precioSup'
                           th:value='${precioSup}'
                           class='form-control'
                           min="0"
                           required/>
                </div>

            </div>

            <div class="card-footer text-center">

                <button type='submit'
                        class='btn text-white'
                        th:classappend="${'btn-'+colorForm}">

                    <i class='fa-solid fa-magnifying-glass'></i>
                    [[${textoForm}]]

                </button>

            </div>

        </div>

    </form>

</div>

</html>
